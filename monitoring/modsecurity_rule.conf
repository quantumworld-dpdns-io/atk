#
# ModSecurity Rule for CVE-2026-42945 (NGINX Rift)
#
# Detects exploit attempts targeting the heap buffer overflow in
# ngx_http_rewrite_module via crafted URIs with excessive '+' characters.
#

# Phase:2 (REQUEST_URI)
#
# The exploit requires:
#   1. A URI path matching a vulnerable rewrite pattern
#   2. An excessive number of '+' characters (or other escapable chars)
#      in the capture group portion of the URI
#
# This rule detects URIs with abnormally high concentrations of
# escapable characters in paths that match common rewrite patterns.

# Detect paths with rewrite-like patterns and excessive + signs
SecRule REQUEST_URI "@rx /api/[A-Za-z0-9/_-]*\+{100,}" \
    "id:1000001,\
    phase:2,\
    block,\
    capture,\
    t:none,\
    msg:'CVE-2026-42945 NGINX Rift exploit attempt detected',\
    logdata:'Matched URI: %{REQUEST_URI}',\
    severity:'CRITICAL',\
    tag:'CVE-2026-42945',\
    tag:'NGINX-Rift',\
    tag:'PCI',\
    tag:'OWASP_CRS',\
    ver:'1.0.0',\
    chain"

SecRule REQUEST_URI "@rx \+{100,}" \
    "t:none,\
    setvar:tx.exploit_score=+100"

# Detect URIs with excessive %XX encoded escapable characters
SecRule REQUEST_URI "@rx (%26|%2B|%25){50,}" \
    "id:1000002,\
    phase:2,\
    block,\
    capture,\
    t:none,\
    msg:'CVE-2026-42945 NGINX Rift encoded exploit attempt',\
    logdata:'Matched URI: %{REQUEST_URI}',\
    severity:'CRITICAL',\
    tag:'CVE-2026-42945',\
    tag:'NGINX-Rift',\
    tag:'PCI',\
    ver:'1.0.0'"

# Rate limit: block clients sending many requests with escapable chars
SecRule IP:EXPLOIT_SCORE "@gt 1000" \
    "id:1000003,\
    phase:5,\
    block,\
    t:none,\
    msg:'CVE-2026-42945 exploit attempt — rate limit exceeded',\
    severity:'CRITICAL',\
    tag:'CVE-2026-42945',\
    tag:'NGINX-Rift',\
    ver:'1.0.0'"
