#
# VULNERABLE configuration demonstrating CVE-2026-42945 trigger pattern.
#
# The combination of:
#   1. rewrite with '?' in replacement
#   2. set/if/rewrite referencing unnamed capture $1
#
# triggers the heap buffer overflow.
#

server {
    listen 80;

    # VULNERABLE: rewrite sets is_args=1 via '?' in replacement
    #            set $1 evaluates on main engine with is_args still set
    #            but length was computed with sub-engine (is_args=0)
    location ~ ^/api/(.*)$ {
        rewrite ^/api/(.*)$ /internal?migrated=true;
        set $original_endpoint $1;
    }

    # VULNERABLE: rewrite followed by if with capture
    location ~ ^/users/([0-9]+)$ {
        rewrite ^/users/([0-9]+)$ /profile?uid=$1;
        if ($uid) {
            set $user $1;
        }
    }

    # VULNERABLE: rewrite followed by another rewrite with capture
    location ~ ^/v1/(.*)/details$ {
        rewrite ^/v1/(.*)/details$ /v2/$1?version=2;
        rewrite ^/v2/(.*)$ /details?id=$1 last;
    }

    location /internal {
        internal;
        proxy_pass http://backend;
    }

    location / {
        return 200 "ok\n";
    }
}
