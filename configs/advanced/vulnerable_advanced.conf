#
# Advanced vulnerable config — multiple vulnerable patterns
# Demonstrates various rewrite + set/if/rewrite combinations.
#

server {
    listen 80;

    # VULN: rewrite followed by if
    location ~ ^/users/([0-9]+)$ {
        rewrite ^/users/([0-9]+)$ /profile?uid=$1;
        if ($uid) {
            set $role $1;
        }
    }

    # VULN: rewrite followed by another rewrite
    location ~ ^/v1/(.*)/details$ {
        rewrite ^/v1/(.*)/details$ /v2/$1?version=2;
        rewrite ^/v2/(.*)$ /details?id=$1 last;
    }

    # VULN: rewrite in server context (inherited by locations)
    rewrite ^/legacy/(.*)$ /new?from=$1;
    set $captured $1;

    # VULN: rewrite with break flag, then if
    location /break {
        rewrite ^/break/(.*)$ /internal?src=$1 break;
        if ($args) {
            set $x $1;
        }
    }

    # VULN: rewrite with last flag, then set
    location /chain {
        rewrite ^/chain/(.*)$ /final?q=$1 last;
        set $track $1;
    }

    location /internal {
        internal;
        proxy_pass http://backend;
    }

    location / {
        return 200 "ok\n";
    }
}
