#
# Ingress NGINX Controller vulnerable config
# Simulates nginx.conf generated by ingress-nginx with rewrite-target.
#

worker_processes 1;
error_log /var/log/nginx/error.log debug;

events { worker_connections 1024; }

http {
    lua_package_path "/etc/nginx/lua/?.lua;;";

    server {
        listen 80;

        # VULN: Generated by ingress-nginx rewrite-target annotation
        location ~* ^/api/ {
            set $namespace "default";
            set $ingress_name "my-ingress";
            set $service_name "my-service";
            set $service_port "80";
            set $location_path "/api";
            rewrite ^/api/(.*) /$1 break;
            proxy_pass http://default-my-service-80.$namespace.svc.cluster.local:80;
        }

        # VULN: Generated by ingress-nginx use-regex with rewrite
        location ~* ^/old(.*)$ {
            rewrite ^/old(.*)$ /new$1?redirect=true;
            set $orig_path $1;
            proxy_pass http://backend;
        }

        # SAFE: No rewrite
        location / {
            proxy_pass http://backend;
        }
    }
}
