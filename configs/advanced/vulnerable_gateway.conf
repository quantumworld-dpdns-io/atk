#
# NGINX Gateway Fabric vulnerable config
# Demonstrates patterns used in nginx-gateway controller configurations.
#

worker_processes 1;
events { worker_connections 1024; }

http {
    server {
        listen 80;

        # VULN: Gateway API route rewrite pattern
        location ~ ^/httproute-1/(.*)$ {
            rewrite ^/httproute-1/(.*)$ /v1/$1?route=1;
            set $route_path $1;
            proxy_pass http://backend;
        }

        # VULN: Header modification via rewrite + set
        location ~ ^/header-rewrite/(.*)$ {
            rewrite ^/header-rewrite/(.*)$ /internal?hdr=$1;
            set $original $1;
            proxy_set_header X-Original $original;
            proxy_pass http://backend;
        }

        location / {
            return 200 "gateway ok\n";
        }
    }
}
