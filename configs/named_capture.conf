#
# MITIGATED configuration using named captures instead of unnamed.
# This avoids the is_args leak because named captures are not
# processed through the copy_capture_code path.
#

server {
    listen 80;

    # MITIGATED: named capture groups avoid the mismatched escaping issue
    location ~ ^/users/(?<user_id>[0-9]+)/profile/(?<section>.*)$ {
        rewrite ^/users/[0-9]+/profile/.*$ /profile.php?id=$user_id&tab=$section last;
        set $user_id_captured $user_id;
    }

    # MITIGATED: named capture with query string in replacement
    location ~ ^/api/(?<endpoint>.*)$ {
        rewrite ^/api/.*$ /internal?ep=$endpoint;
        set $original_endpoint $endpoint;
    }

    location / {
        return 200 "ok\n";
    }
}
