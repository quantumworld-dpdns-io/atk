# Falco Rule for CVE-2026-42945 (NGINX Rift)
#
# Detects NGINX worker process crashes caused by exploitation attempts.
# This rule monitors for SIGSEGV signals delivered to nginx worker
# processes and correlates them with HTTP request patterns.

- rule: NGINX Worker Crash Detected
  desc: >
    An NGINX worker process received SIGSEGV, potentially from
    CVE-2026-42945 (NGINX Rift) heap buffer overflow exploitation.
    NGINX master will respawn the worker, but repeated crashes
    indicate an active attack.
  condition: >
    proc.name = "nginx"
    and evt.type = "signal"
    and evt.arg.sig = 11
    and proc.pname = "nginx"
  output: >
    NGINX worker crashed with SIGSEGV
    (user=%user.name pid=%proc.pid parent=%proc.pname
     cmdline=%proc.cmdline evt=%evt.args)
  priority: CRITICAL
  tags: [CVE-2026-42945, NGINX, heap_overflow, exploitation]

- rule: NGINX Worker Crash Loop
  desc: >
    Multiple NGINX worker crashes detected in quick succession.
    This indicates an active exploitation attempt against
    CVE-2026-42945.
  condition: >
    proc.name = "nginx"
    and evt.type = "signal"
    and evt.arg.sig = 11
    and proc.pname = "nginx"
  output: >
    NGINX crash loop detected
    (user=%user.name pid=%proc.pid cmdline=%proc.cmdline
     count=%evt.count)
  priority: CRITICAL
  tags: [CVE-2026-42945, NGINX, crash_loop, dos]
  rate: 5
  maxBurst: 1
  seconds: 30

- rule: NGINX Heap Spray POST
  desc: >
    POST request to /spray with large body and X-Delay header
    matching CVE-2026-42945 heap spray technique.
  condition: >
    proc.name = "nginx"
    and evt.type = "accept"
    and (evt.buffer contains "POST /spray")
    and (evt.buffer contains "X-Delay: 60")
  output: >
    Possible CVE-2026-42945 heap spray attempt
    (fd=%evt.fd pid=%proc.pid)
  priority: WARNING
  tags: [CVE-2026-42945, NGINX, heap_spray]
