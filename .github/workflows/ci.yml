name: CVE-2026-42945 CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Shellcheck scripts
        run: |
          sudo apt-get install -y shellcheck
          shellcheck exploit/*.py detection/*.sh tools/*.sh shell/*.sh pipelines/*.sh 2>/dev/null || true
      - name: Validate Python syntax
        run: |
          python3 -m py_compile exploit/*.py detection/*.py tools/*.py shell/*.py test/*.py

  scan-configs:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Run config scanner
        run: |
          python3 exploit/config_scanner.py configs/vulnerable.conf
          python3 exploit/config_scanner.py configs/safe.conf
          python3 exploit/config_scanner.py configs/named_capture.conf

  fuzz-build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Build fuzzer
        run: |
          sudo apt-get install -y clang
          cd fuzz && bash fuzz_build.sh

  test:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Run unit tests
        run: |
          python3 -m pytest test/ -v || python3 -m unittest discover -s test -v

  detect-patch:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Verify patch format
        run: |
          for p in patches/*.patch; do
            echo "Checking $p..."
            git apply --check "$p" 2>/dev/null && echo "  OK" || echo "  SKIP (not applicable)"
          done
      - name: Verify fix contains is_args reset
        run: |
          grep -q 'is_args = 0' patches/0001-fix-is_args.patch && echo "Fix verified" || { echo "Fix missing!"; exit 1; }

  verify-project:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Run project verification
        run: |
          bash tools/verify_project.sh
